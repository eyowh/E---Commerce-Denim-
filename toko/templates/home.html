{% extends 'toko/base.html' %}

{% block content %}
<h2 class="text-2xl font-bold mb-6">Produk Denim</h2>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    {% for p in produk %}
    <div class="bg-white rounded-xl shadow-md p-4 hover:shadow-lg transition">
        <img src="{{ p.gambar.url }}" class="w-full h-48 object-cover rounded">

        <h3 class="text-lg font-semibold mt-3">{{ p.nama }}</h3>
        <p class="text-gray-600">Rp {{ p.harga }}</p>

        <a href="{% url 'detail' p.id %}"
           class="block mt-3 bg-black text-white text-center py-2 rounded hover:bg-gray-800">
            Lihat Detail
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}
