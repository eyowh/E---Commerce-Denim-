{% extends 'toko/base.html' %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-denim-50 to-denim-100 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <div class="mx-auto h-20 w-20 bg-denim-900 rounded-full flex items-center justify-center mb-4">
                <i class="fas fa-user text-white text-3xl"></i>
            </div>
            <h2 class="text-3xl font-bold text-denim-900">Login ke Catty Denim</h2>
            <p class="mt-2 text-sm text-gray-600">Masuk untuk melanjutkan belanja</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="bg-{{ message.tags }}-100 border border-{{ message.tags }}-400 text-{{ message.tags }}-700 px-4 py-3 rounded-lg" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form class="mt-8 space-y-6" action="{% url 'login' %}" method="POST">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input id="username" name="username" type="text" required
                               class="appearance-none rounded-lg relative block w-full pl-10 pr-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-denim-500 focus:border-denim-500 focus:z-10 sm:text-sm"
                               placeholder="Masukkan username">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input id="password" name="password" type="password" required
                               class="appearance-none rounded-lg relative block w-full pl-10 pr-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-denim-500 focus:border-denim-500 focus:z-10 sm:text-sm"
                               placeholder="Masukkan password">
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-denim-600 focus:ring-denim-500 border-gray-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-900">Ingat saya</label>
                </div>

                <div class="text-sm">
                    <a href="#" class="font-medium text-denim-600 hover:text-denim-500">Lupa password?</a>
                </div>
            </div>

            <div>
                <button type="submit"
                        class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-denim-900 hover:bg-denim-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-denim-500 transition-colors">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fas fa-sign-in-alt group-hover:scale-110 transition-transform"></i>
                    </span>
                    Login
                </button>
            </div>

            <div class="text-center">
                <span class="text-sm text-gray-600">Belum punya akun?</span>
                <a href="{% url 'register' %}" class="font-medium text-denim-600 hover:text-denim-500 ml-1">Daftar sekarang</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
