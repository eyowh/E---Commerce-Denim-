{% extends 'toko/base.html' %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-denim-50 via-white to-denim-100 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <!-- Background Pattern -->
    <div class="absolute inset-0 opacity-5">
        <div class="absolute inset-0" style="background-image: url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23000000" fill-opacity="0.4"%3E%3Cpath d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');"></div>
    </div>

    <div class="relative max-w-md w-full">
        <!-- Main Card -->
        <div class="bg-white/80 backdrop-blur-sm shadow-2xl rounded-2xl overflow-hidden border border-white/20">
            <!-- Header Section -->
            <div class="bg-gradient-to-r from-denim-900 to-denim-700 px-8 py-8 text-center relative overflow-hidden">
                <!-- Decorative Elements -->
                <div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -mr-16 -mt-16"></div>
                <div class="absolute bottom-0 left-0 w-24 h-24 bg-white/5 rounded-full -ml-12 -mb-12"></div>
                
                <!-- Icon -->
                <div class="relative inline-flex items-center justify-center w-20 h-20 bg-white/10 backdrop-blur-sm rounded-full mb-4 ring-4 ring-white/20">
                    <i class="fas fa-user-plus text-white text-2xl"></i>
                </div>
                
                <!-- Title -->
                <h1 class="text-3xl font-bold text-white mb-2">Buat Akun Baru</h1>
                <p class="text-denim-100 text-sm">Bergabung dengan Catty Denim dan mulai berbelanja</p>
            </div>

            <!-- Form Section -->
            <div class="px-8 py-8">
                <!-- Messages -->
                {% if messages %}
                    {% for message in messages %}
                    <div class="mb-6 p-4 rounded-lg border {% if message.tags == 'error' %}bg-red-50 border-red-200 text-red-700{% elif message.tags == 'success' %}bg-green-50 border-green-200 text-green-700{% else %}bg-blue-50 border-blue-200 text-blue-700{% endif %} animate-fade-in">
                        <div class="flex items-start">
                            <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle text-red-500{% elif message.tags == 'success' %}fa-check-circle text-green-500{% else %}fa-info-circle text-blue-500{% endif %} mt-0.5 mr-3"></i>
                            <p class="text-sm font-medium">{{ message }}</p>
                        </div>
                    </div>
                    {% endfor %}
                {% endif %}

                <!-- Registration Form -->
                <form method="POST" class="space-y-5">
                    {% csrf_token %}
                    
                    <!-- Username Field -->
                    <div class="group">
                        <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">
                            <i class="fas fa-user-tag text-denim-600 mr-1"></i>Username
                        </label>
                        <div class="relative">
                            <input id="username" name="username" type="text" required
                                   class="w-full px-4 py-3 pl-12 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-denim-500 focus:border-transparent transition-all duration-200 group-hover:border-gray-300"
                                   placeholder="Buat username unik">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-user-tag text-gray-400 group-hover:text-denim-500 transition-colors"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Email Field -->
                    <div class="group">
                        <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">
                            <i class="fas fa-envelope text-denim-600 mr-1"></i>Email Address
                        </label>
                        <div class="relative">
                            <input id="email" name="email" type="email" required
                                   class="w-full px-4 py-3 pl-12 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-denim-500 focus:border-transparent transition-all duration-200 group-hover:border-gray-300"
                                   placeholder="email@example.com">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-envelope text-gray-400 group-hover:text-denim-500 transition-colors"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="group">
                        <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
                            <i class="fas fa-lock text-denim-600 mr-1"></i>Password
                        </label>
                        <div class="relative">
                            <input id="password" name="password" type="password" required
                                   class="w-full px-4 py-3 pl-12 pr-12 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-denim-500 focus:border-transparent transition-all duration-200 group-hover:border-gray-300"
                                   placeholder="Minimal 8 karakter">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-gray-400 group-hover:text-denim-500 transition-colors"></i>
                            </div>
                            <button type="button" onclick="togglePassword('password')" class="absolute inset-y-0 right-0 pr-4 flex items-center">
                                <i id="password-toggle" class="fas fa-eye text-gray-400 hover:text-denim-500 transition-colors"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Confirm Password Field -->
                    <div class="group">
                        <label for="password_confirm" class="block text-sm font-semibold text-gray-700 mb-2">
                            <i class="fas fa-lock text-denim-600 mr-1"></i>Konfirmasi Password
                        </label>
                        <div class="relative">
                            <input id="password_confirm" name="password_confirm" type="password" required
                                   class="w-full px-4 py-3 pl-12 pr-12 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-denim-500 focus:border-transparent transition-all duration-200 group-hover:border-gray-300"
                                   placeholder="Ulangi password">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-gray-400 group-hover:text-denim-500 transition-colors"></i>
                            </div>
                            <button type="button" onclick="togglePassword('password_confirm')" class="absolute inset-y-0 right-0 pr-4 flex items-center">
                                <i id="password_confirm-toggle" class="fas fa-eye text-gray-400 hover:text-denim-500 transition-colors"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Terms Checkbox -->
                    <div class="flex items-start space-x-3 p-4 bg-gray-50 rounded-lg">
                        <input id="terms" name="terms" type="checkbox" required 
                               class="mt-1 h-4 w-4 text-denim-600 focus:ring-denim-500 border-gray-300 rounded">
                        <label for="terms" class="text-sm text-gray-600 leading-relaxed">
                            Saya menyetujui <a href="#" class="text-denim-600 hover:text-denim-700 font-medium underline">Syarat & Ketentuan</a> 
                            serta <a href="#" class="text-denim-600 hover:text-denim-700 font-medium underline">Kebijakan Privasi</a> 
                            yang berlaku
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit"
                            class="w-full bg-gradient-to-r from-denim-900 to-denim-700 text-white font-semibold py-4 px-6 rounded-xl hover:from-denim-800 hover:to-denim-600 focus:outline-none focus:ring-2 focus:ring-denim-500 focus:ring-offset-2 transform transition-all duration-200 hover:scale-[1.02] shadow-lg hover:shadow-xl">
                        <span class="flex items-center justify-center">
                            <i class="fas fa-user-plus mr-2"></i>
                            Daftar Sekarang
                        </span>
                    </button>

                    <!-- Login Link -->
                    <div class="text-center pt-4 border-t border-gray-200">
                        <p class="text-sm text-gray-600">
                            Sudah punya akun? 
                            <a href="{% url 'login' %}" class="font-semibold text-denim-600 hover:text-denim-700 transition-colors">
                                Login di sini
                            </a>
                        </p>
                    </div>
                </form>
            </div>
        </div>

        <!-- Benefits Section -->
        <div class="mt-8 grid grid-cols-3 gap-4">
            <div class="text-center p-4 bg-white/60 backdrop-blur-sm rounded-xl border border-white/20">
                <div class="w-10 h-10 bg-denim-100 rounded-full flex items-center justify-center mx-auto mb-2">
                    <i class="fas fa-shield-alt text-denim-600 text-sm"></i>
                </div>
                <p class="text-xs text-gray-600 font-medium">Aman</p>
            </div>
            <div class="text-center p-4 bg-white/60 backdrop-blur-sm rounded-xl border border-white/20">
                <div class="w-10 h-10 bg-denim-100 rounded-full flex items-center justify-center mx-auto mb-2">
                    <i class="fas fa-bolt text-denim-600 text-sm"></i>
                </div>
                <p class="text-xs text-gray-600 font-medium">Cepat</p>
            </div>
            <div class="text-center p-4 bg-white/60 backdrop-blur-sm rounded-xl border border-white/20">
                <div class="w-10 h-10 bg-denim-100 rounded-full flex items-center justify-center mx-auto mb-2">
                    <i class="fas fa-gift text-denim-600 text-sm"></i>
                </div>
                <p class="text-xs text-gray-600 font-medium">Reward</p>
            </div>
        </div>
    </div>
</div>

<!-- Custom CSS -->
<style>
@keyframes fade-in {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.animate-fade-in {
    animation: fade-in 0.3s ease-out;
}

/* Custom scrollbar */
::-webkit-scrollbar {
    width: 8px;
}

::-webkit-scrollbar-track {
    background: #f1f1f1;
}

::-webkit-scrollbar-thumb {
    background: #888;
    border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
    background: #555;
}
</style>

<!-- JavaScript -->
<script>
function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    const toggle = document.getElementById(fieldId + '-toggle');
    
    if (field.type === 'password') {
        field.type = 'text';
        toggle.classList.remove('fa-eye');
        toggle.classList.add('fa-eye-slash');
    } else {
        field.type = 'password';
        toggle.classList.remove('fa-eye-slash');
        toggle.classList.add('fa-eye');
    }
}

// Form validation
document.querySelector('form').addEventListener('submit', function(e) {
    const password = document.getElementById('password').value;
    const passwordConfirm = document.getElementById('password_confirm').value;
    const terms = document.getElementById('terms').checked;
    
    if (password.length < 8) {
        e.preventDefault();
        alert('Password minimal 8 karakter!');
        return;
    }
    
    if (password !== passwordConfirm) {
        e.preventDefault();
        alert('Password tidak sama!');
        return;
    }
    
    if (!terms) {
        e.preventDefault();
        alert('Anda harus menyetujui syarat dan ketentuan!');
        return;
    }
});

// Input animations
document.querySelectorAll('input').forEach(input => {
    input.addEventListener('focus', function() {
        this.parentElement.classList.add('ring-2', 'ring-denim-500', 'ring-offset-2');
    });
    
    input.addEventListener('blur', function() {
        this.parentElement.classList.remove('ring-2', 'ring-denim-500', 'ring-offset-2');
    });
});
</script>

{% endblock %}
