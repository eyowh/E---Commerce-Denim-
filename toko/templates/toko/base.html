{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denim Store</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- Navbar -->
<nav class="bg-black text-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-6 py-3 flex items-center justify-between">

        <!-- Logo + Link Home -->
        <a href="{% url 'home' %}" class="flex items-center gap-2 hover:opacity-80 transition">
            <img src="{% static 'toko/img/logo.png' %}" 
                 alt="Logo" 
                 class="h-10 w-10 object-contain">
            
        </a>

        <!-- Menu -->
        <div class="flex items-center gap-6">
            <a href="{% url 'home' %}" class="hover:text-gray-300 transition">
                Home
            </a>

            <!-- Contoh menu tambahan -->
            <a href="#" class="hover:text-gray-300 transition">
                Produk
            </a>

            <!-- Cart (opsional) -->
            <a href="#" class="relative hover:text-gray-300 transition">
                🛒
                <span class="absolute -top-2 -right-3 bg-red-500 text-xs px-1 rounded-full">
                    0
                </span>
            </a>
        </div>

    </div>
</nav>

<!-- Content -->
<main class="container mx-auto px-6 py-6">
    {% block content %}
    {% endblock %}
</main>

<!-- Footer -->
<footer class="bg-black text-white mt-10">
    <div class="container mx-auto px-6 py-4 text-center">
        <p class="text-sm">
            © 2026 Denim Store. All rights reserved.
        </p>
    </div>
</footer>

</body>
</html>
