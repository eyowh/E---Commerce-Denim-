{% extends 'toko/base.html' %}

{% block content %}
<div class="bg-white p-6 rounded-xl shadow-md max-w-md mx-auto text-center">

    <h2 class="text-xl font-bold mb-4">Pembayaran QRIS</h2>

    <p class="mb-3">Total: <b>Rp {{ pesanan.total_harga }}</b></p>

    <img src="/media/qris.png" class="mx-auto w-48 mb-4">

    <form method="post" enctype="multipart/form-data" class="space-y-3">
        {% csrf_token %}
        <input type="file" name="bukti" class="w-full border p-2 rounded">

        <button class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">
            Upload Bukti
        </button>
    </form>

</div>
{% endblock %}
